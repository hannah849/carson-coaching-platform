<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5efe6"/>
      <stop offset="50%" style="stop-color:#ebe4d8"/>
      <stop offset="100%" style="stop-color:#e2d9cb"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#faf6f0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ebe4d8;stop-opacity:0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect width="280" height="320" rx="12" fill="url(#bg)"/>

  <!-- Soft glow -->
  <rect width="280" height="320" rx="12" fill="url(#glow)"/>

  <!-- Subtle grain texture overlay -->
  <rect width="280" height="320" rx="12" fill="url(#bg)" filter="url(#grain)" opacity="0.3"/>

  <!-- Decorative arc lines -->
  <path d="M 140 260 Q 80 180 140 120 Q 200 180 140 260" fill="none" stroke="#c9b99a" stroke-width="0.8" opacity="0.4"/>
  <path d="M 140 270 Q 60 175 140 100 Q 220 175 140 270" fill="none" stroke="#c9b99a" stroke-width="0.6" opacity="0.25"/>
  <path d="M 140 280 Q 40 170 140 80 Q 240 170 140 280" fill="none" stroke="#c9b99a" stroke-width="0.4" opacity="0.15"/>

  <!-- Small sun/circle motif -->
  <circle cx="140" cy="115" r="18" fill="none" stroke="#c4a97d" stroke-width="1" opacity="0.35"/>
  <circle cx="140" cy="115" r="6" fill="#c4a97d" opacity="0.25"/>

  <!-- Text: "Morning" -->
  <text x="140" y="188" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#8a7a65" letter-spacing="3" opacity="0.7">Morning</text>

  <!-- Text: "Grounding" -->
  <text x="140" y="214" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#8a7a65" letter-spacing="3" opacity="0.7">Grounding</text>
</svg>
